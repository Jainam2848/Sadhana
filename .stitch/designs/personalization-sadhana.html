<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Sadhana - Personalization</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&amp;family=EB+Garamond:wght@600&amp;family=Noto+Serif+Devanagari:wght@500&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",
                        "inverse-surface": "#392f22",
                        "surface-container-high": "#f7e5d2",
                        "primary-fixed": "#ffdbd0",
                        "tertiary-fixed-dim": "#8ccdff",
                        "inverse-on-surface": "#ffeedc",
                        "background-bone": "#FDFAF5",
                        "highlight-sandstone": "#F5E6C8",
                        "surface-dim": "#e8d7c5",
                        "outline": "#8c7169",
                        "on-primary-fixed-variant": "#852400",
                        "primary-container": "#c44b22",
                        "on-secondary-container": "#736248",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#005f8c",
                        "primary-fixed-dim": "#ffb59e",
                        "surface-container-highest": "#f1e0cd",
                        "tertiary-fixed": "#cae6ff",
                        "on-secondary-fixed": "#251906",
                        "on-surface-variant": "#58423b",
                        "secondary-fixed": "#f7dfbf",
                        "tertiary-container": "#0079b0",
                        "on-tertiary-fixed": "#001e30",
                        "on-surface": "#231a0f",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#f7dfbf",
                        "surface-variant": "#f1e0cd",
                        "on-secondary-fixed-variant": "#54442d",
                        "outline-variant": "#e0c0b6",
                        "on-background": "#231a0f",
                        "on-tertiary-fixed-variant": "#004b70",
                        "surface-tint": "#a9380f",
                        "inverse-primary": "#ffb59e",
                        "border-subtle": "rgba(42, 29, 10, 0.08)",
                        "destructive-red": "#991F1F",
                        "surface": "#fff8f4",
                        "secondary-fixed-dim": "#dac3a4",
                        "background": "#fff8f4",
                        "on-primary-fixed": "#3a0b00",
                        "surface-white": "#FFFFFF",
                        "on-tertiary-container": "#f5f9ff",
                        "surface-container-low": "#fff1e4",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "error": "#ba1a1a",
                        "success-ashoka": "#1A6B3A",
                        "surface-bright": "#fff8f4",
                        "on-primary": "#ffffff",
                        "surface-container": "#fdebd8",
                        "primary": "#a3330a",
                        "on-primary-container": "#fff7f5",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#6d5c43"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "section-gap": "48px",
                        "margin-page": "24px",
                        "stack-md": "16px",
                        "gutter-grid": "16px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "label-sm": ["DM Sans"],
                        "headline-md": ["EB Garamond"],
                        "label-md": ["DM Sans"],
                        "headline-lg": ["EB Garamond"],
                        "body-lg": ["DM Sans"],
                        "sanskrit-overlay": ["Noto Serif Devanagari"],
                        "display-lg": ["EB Garamond"],
                        "body-md": ["DM Sans"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "sanskrit-overlay": ["18px", { "lineHeight": "28px", "fontWeight": "500" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: theme('colors.background-bone');
            color: theme('colors.on-background');
        }
        
        /* The Mandala Thread */
        body::before {
            content: '';
            position: fixed;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            border: 0.5px solid theme('colors.primary-container');
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .fade-in-hidden {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }

        .fade-in-visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col relative font-body-md text-body-md antialiased overflow-x-hidden">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-background dark:bg-background border-b border-border-subtle z-40">
<div class="flex justify-between items-center px-margin-page py-stack-sm w-full max-w-7xl mx-auto">
<button aria-label="Back" class="text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity flex items-center justify-center p-2 -ml-2 rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Sadhana</h1>
<div class="w-10"></div> <!-- Placeholder for balance -->
</div>
<!-- Progress Bar -->
<div class="w-full h-1 bg-surface-container-highest">
<div class="h-full bg-primary-container transition-all duration-1000 ease-in-out" style="width: 15%;"></div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto px-margin-page py-section-gap pb-32 max-w-2xl mx-auto w-full relative z-10">
<!-- Question 1: Goals -->
<section class="mb-section-gap" id="section-goals">
<h2 class="font-headline-md text-headline-md text-on-surface mb-stack-lg">What brings you to your mat?</h2>
<div class="flex flex-col gap-stack-sm">
<!-- Card 1 -->
<button class="goal-card w-full text-left bg-surface-white rounded-lg border border-border-subtle p-4 flex items-center justify-between transition-all duration-200 active:scale-98" data-value="stress">
<span class="font-body-lg text-body-lg text-on-surface">Relieve stress and anxiety</span>
<div class="w-6 h-6 rounded-full border border-outline flex items-center justify-center indicator"></div>
</button>
<!-- Card 2 -->
<button class="goal-card w-full text-left bg-surface-white rounded-lg border border-border-subtle p-4 flex items-center justify-between transition-all duration-200 active:scale-98" data-value="mobility">
<span class="font-body-lg text-body-lg text-on-surface">Improve joint mobility and flexibility</span>
<div class="w-6 h-6 rounded-full border border-outline flex items-center justify-center indicator"></div>
</button>
<!-- Card 3 -->
<button class="goal-card w-full text-left bg-surface-white rounded-lg border border-border-subtle p-4 flex items-center justify-between transition-all duration-200 active:scale-98" data-value="philosophy">
<span class="font-body-lg text-body-lg text-on-surface">Connect with yogic philosophy</span>
<div class="w-6 h-6 rounded-full border border-outline flex items-center justify-center indicator"></div>
</button>
</div>
</section>
<!-- Question 2: Experience (Fades in) -->
<section class="mb-section-gap fade-in-hidden" id="section-experience">
<h2 class="font-headline-md text-headline-md text-on-surface mb-stack-md">How would you describe your experience?</h2>
<div class="flex flex-wrap gap-stack-sm">
<button class="exp-chip bg-background-bone border border-border-subtle rounded-full px-6 py-3 font-label-md text-label-md text-on-surface-variant transition-colors duration-200 active:scale-98" data-value="beginner">Beginner</button>
<button class="exp-chip bg-background-bone border border-border-subtle rounded-full px-6 py-3 font-label-md text-label-md text-on-surface-variant transition-colors duration-200 active:scale-98" data-value="intermediate">Intermediate</button>
<button class="exp-chip bg-background-bone border border-border-subtle rounded-full px-6 py-3 font-label-md text-label-md text-on-surface-variant transition-colors duration-200 active:scale-98" data-value="advanced">Advanced</button>
</div>
</section>
<!-- Question 3: Schedule (Fades in) -->
<section class="mb-section-gap fade-in-hidden" id="section-schedule">
<h2 class="font-headline-md text-headline-md text-on-surface mb-stack-md">When will you practice daily?</h2>
<div class="flex flex-wrap gap-stack-sm">
<button class="sched-chip bg-background-bone border border-border-subtle rounded-full px-6 py-3 font-label-md text-label-md text-on-surface-variant transition-colors duration-200 active:scale-98 flex items-center gap-2" data-value="morning">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 0;">wb_sunny</span>
                    Morning
                </button>
<button class="sched-chip bg-background-bone border border-border-subtle rounded-full px-6 py-3 font-label-md text-label-md text-on-surface-variant transition-colors duration-200 active:scale-98 flex items-center gap-2" data-value="afternoon">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 0;">wb_twilight</span>
                    Afternoon
                </button>
<button class="sched-chip bg-background-bone border border-border-subtle rounded-full px-6 py-3 font-label-md text-label-md text-on-surface-variant transition-colors duration-200 active:scale-98 flex items-center gap-2" data-value="evening">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 0;">bedtime</span>
                    Evening
                </button>
</div>
</section>
</main>
<!-- Sticky Bottom Button -->
<div class="fixed bottom-0 left-0 w-full p-margin-page bg-gradient-to-t from-background-bone via-background-bone to-transparent z-50 flex justify-center">
<button class="w-full max-w-md h-12 rounded-full bg-primary-container text-on-tertiary font-label-md text-label-md opacity-50 cursor-not-allowed transition-opacity duration-300 flex items-center justify-center gap-2" disabled="" id="btn-continue">
            Continue
            <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const state = {
                goalSelected: false,
                expSelected: false,
                schedSelected: false
            };

            const goalCards = document.querySelectorAll('.goal-card');
            const sectionExp = document.getElementById('section-experience');
            const expChips = document.querySelectorAll('.exp-chip');
            const sectionSched = document.getElementById('section-schedule');
            const schedChips = document.querySelectorAll('.sched-chip');
            const btnContinue = document.getElementById('btn-continue');

            function checkCompletion() {
                if (state.goalSelected && state.expSelected && state.schedSelected) {
                    btnContinue.classList.remove('opacity-50', 'cursor-not-allowed');
                    btnContinue.disabled = false;
                }
            }

            // Goal Selection
            goalCards.forEach(card => {
                card.addEventListener('click', () => {
                    // Reset others
                    goalCards.forEach(c => {
                        c.classList.remove('bg-highlight-sandstone', 'border-primary-container');
                        c.classList.add('bg-surface-white', 'border-border-subtle');
                        const ind = c.querySelector('.indicator');
                        ind.classList.remove('bg-primary-container', 'border-primary-container');
                        ind.innerHTML = '';
                    });

                    // Set active
                    card.classList.remove('bg-surface-white', 'border-border-subtle');
                    card.classList.add('bg-highlight-sandstone', 'border-primary-container');
                    const ind = card.querySelector('.indicator');
                    ind.classList.add('bg-primary-container', 'border-primary-container');
                    ind.innerHTML = '<span class="material-symbols-outlined text-on-tertiary text-sm" style="font-variation-settings: \'FILL\' 1;">check</span>';

                    state.goalSelected = true;
                    sectionExp.classList.add('fade-in-visible');
                    
                    // Smooth scroll slightly
                    setTimeout(() => {
                        sectionExp.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                    
                    checkCompletion();
                });
            });

            // Experience Selection
            expChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    expChips.forEach(c => {
                        c.classList.remove('bg-primary-container', 'text-on-tertiary', 'border-primary-container');
                        c.classList.add('bg-background-bone', 'text-on-surface-variant', 'border-border-subtle');
                    });

                    chip.classList.remove('bg-background-bone', 'text-on-surface-variant', 'border-border-subtle');
                    chip.classList.add('bg-primary-container', 'text-on-tertiary', 'border-primary-container');

                    state.expSelected = true;
                    sectionSched.classList.add('fade-in-visible');

                     setTimeout(() => {
                        sectionSched.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);

                    checkCompletion();
                });
            });

            // Schedule Selection
            schedChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    schedChips.forEach(c => {
                        c.classList.remove('bg-primary-container', 'text-on-tertiary', 'border-primary-container');
                        c.classList.add('bg-background-bone', 'text-on-surface-variant', 'border-border-subtle');
                    });

                    chip.classList.remove('bg-background-bone', 'text-on-surface-variant', 'border-border-subtle');
                    chip.classList.add('bg-primary-container', 'text-on-tertiary', 'border-primary-container');

                    state.schedSelected = true;
                    checkCompletion();
                });
            });
        });
    </script>
</body></html>
