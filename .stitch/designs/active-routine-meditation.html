<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Specific immersive background as requested, overriding general theme for this player state */
        .immersive-bg {
            background-color: #0D0A06;
        }

        /* Breathing Animation Keyframes */
        @keyframes breathe-path {
            0% { transform: scale(1); opacity: 0.6; }
            33% { transform: scale(1.6); opacity: 1; }
            50% { transform: scale(1.63); opacity: 1; } /* Subtle pulse during hold */
            66% { transform: scale(1.6); opacity: 1; }
            100% { transform: scale(1); opacity: 0.6; }
        }

        @keyframes breathe-path-inner {
            0% { transform: scale(1); opacity: 0.4; }
            33% { transform: scale(1.4); opacity: 0.8; }
            50% { transform: scale(1.42); opacity: 0.8; }
            66% { transform: scale(1.4); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.4; }
        }

        @keyframes breathe-path-core {
            0% { transform: scale(1); opacity: 0.2; }
            33% { transform: scale(1.2); opacity: 0.6; }
            50% { transform: scale(1.21); opacity: 0.6; }
            66% { transform: scale(1.2); opacity: 0.6; }
            100% { transform: scale(1); opacity: 0.2; }
        }

        .anim-breathe-outer { animation: breathe-path 12s infinite cubic-bezier(0.4, 0, 0.2, 1); transform-origin: center; }
        .anim-breathe-inner { animation: breathe-path-inner 12s infinite cubic-bezier(0.4, 0, 0.2, 1); transform-origin: center; }
        .anim-breathe-core { animation: breathe-path-core 12s infinite cubic-bezier(0.4, 0, 0.2, 1); transform-origin: center; }

        @media (prefers-reduced-motion: reduce) {
            .anim-breathe-outer, .anim-breathe-inner, .anim-breathe-core {
                animation: none;
                transform: scale(1.2); /* Static middle state */
                transition: opacity 12s infinite;
            }
            .anim-breathe-outer { animation: fade-pulse 12s infinite; }
            
            @keyframes fade-pulse {
                0%, 100% { opacity: 0.5; }
                50% { opacity: 1; }
            }
        }

        .text-fade {
            transition: opacity 0.8s ease-in-out;
        }

        /* Custom range slider styling for minimal aesthetic */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -5px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
        }
        /* Filled portion of track (simulated via background gradient in inline style if needed, or just keep it minimal) */
    </style>

<body class="immersive-bg text-surface-white h-screen w-full overflow-hidden flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-white relative">
<!-- Mandala Thread Anchor (Top Right) -->
<svg class="absolute top-0 right-0 w-32 h-32 pointer-events-none opacity-40" fill="none" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<path d="M 100 0 A 100 100 0 0 0 0 100" stroke="#C44B22" stroke-dasharray="2 4" stroke-width="0.5"></path>
<path d="M 100 10 A 90 90 0 0 0 10 100" opacity="0.5" stroke="#C44B22" stroke-width="0.25"></path>
</svg>
<!-- Header (Minimal for immersive mode) -->
<header class="flex items-center justify-between px-margin-page py-6 w-full max-w-7xl mx-auto relative z-10">
<button aria-label="Close Player" class="p-2 -ml-2 rounded-full hover:bg-white/10 transition-colors flex items-center justify-center text-surface-white/70 hover:text-white">
<span class="material-symbols-outlined">expand_more</span>
</button>

<!-- Middle 1px -->
<circle class="anim-breathe-inner" cx="100" cy="100" fill="none" r="35" stroke="#C44B22" stroke-width="1"></circle>

<span class="material-symbols-outlined" style="font-size: 28px;">replay_10</span>
</button>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1; font-size: 32px; color: white;">pause</span>
</button>

<span class="material-symbols-outlined" style="font-size: 28px;">forward_10</span>
</button>
</div>
</div>
</footer>
<!-- JavaScript for Breathing Text Sync -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const textElement = document.getElementById('breathText');
            const phases = [
                { text: 'Inhale', duration: 4000 },
                { text: 'Hold', duration: 4000 },
                { text: 'Exhale', duration: 4000 }
            ];
            let currentPhase = 0;

            function updateBreathText() {
                // Fade out
                textElement.style.opacity = 0;
                
                setTimeout(() => {
                    // Update text and fade in
                    currentPhase = (currentPhase + 1) % phases.length;
                    textElement.textContent = phases[currentPhase].text;
                    textElement.style.opacity = 1;
                }, 400); // Wait half of the transition time
            }

            // Start loop (12s total cycle, update every 4s)
            // Initial call
            setTimeout(() => {
                setInterval(updateBreathText, 4000);
                updateBreathText(); // trigger first change after initial inhale
            }, 3600); // slightly offset to sync visually with CSS transform peak
        });
    </script>
