<style>

            top: -24px;

<body class="bg-background-bone min-h-screen text-on-surface flex flex-col font-body-md antialiased selection:bg-highlight-sandstone selection:text-on-surface">
<!-- Mandala Thread Anchor -->
<div aria-hidden="true" class="mandala-thread"></div>
<!-- Header Action -->
<div class="w-full flex justify-end px-margin-page py-6">
<a class="font-label-md text-on-surface-variant hover:text-primary transition-colors duration-200" href="#" style="font-size: 13px; color: #6B5A41;">Skip Registration</a>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col justify-center px-margin-page max-w-md mx-auto w-full pb-section-gap">
<!-- Header Text -->
<div class="mb-stack-lg text-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-stack-sm tracking-tight" style="color: #1C1409;">Secure your trial benefits</h1>
<p class="font-body-md text-on-surface-variant" style="font-size: 13px; color: #6B5A41;">Create an account to preserve your personalized daily routine and daily streak.</p>
</div>
<!-- Registration Form -->
<form action="#" class="flex flex-col gap-stack-md" method="POST">
<!-- Email Field -->
<div class="relative group">
<label class="absolute -top-2 left-3 bg-surface-white px-1 font-label-sm text-label-sm uppercase tracking-wider z-10 transition-colors group-focus-within:text-primary" for="email" style="font-size: 11px; color: #6B5A41;">Email</label>
<input class="custom-input block w-full h-[52px] px-4 py-3 bg-surface-white text-on-surface rounded-xl border border-[rgba(42,29,10,0.15)] bg-clip-padding transition-all font-body-md placeholder-on-surface-variant/50" id="email" name="email" placeholder="you@example.com" required="" type="email">
</div>
<!-- Password Field -->
<div class="relative group">
<label class="absolute -top-2 left-3 bg-surface-white px-1 font-label-sm text-label-sm uppercase tracking-wider z-10 transition-colors group-focus-within:text-primary" for="password" style="font-size: 11px; color: #6B5A41;">Password</label>
<input class="custom-input block w-full h-[52px] pl-4 pr-12 py-3 bg-surface-white text-on-surface rounded-xl border border-[rgba(42,29,10,0.15)] bg-clip-padding transition-all font-body-md placeholder-on-surface-variant/50" id="password" name="password" placeholder="••••••••" required="" type="password">
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-primary focus:outline-none" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility</span>
</button>
</div>
<!-- Primary Action -->
<button class="w-full h-12 mt-stack-sm bg-primary-container text-on-primary rounded-full font-label-md text-label-md hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center" type="submit">
                Create account
            </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-stack-lg">
<div class="flex-grow border-t border-border-subtle"></div>
<span class="flex-shrink-0 mx-4 font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-border-subtle"></div>
</div>
<!-- Social Actions -->
<div class="flex flex-col gap-stack-sm sm:flex-row">
<button class="flex-1 h-12 flex items-center justify-center gap-2 bg-surface-white rounded-xl border border-border-subtle hover:bg-surface-container-low transition-colors font-label-md text-label-md text-on-surface" type="button">

<a class="font-body-md text-on-surface-variant hover:text-primary transition-colors text-sm" href="#">
                Already have an account? <span class="font-semibold text-on-surface">Sign in</span>
</a>

<script>
        // Simple password toggle interaction
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.querySelector('button[aria-label="Toggle password visibility"]');
            const passwordInput = document.getElementById('password');
            const iconSpan = toggleBtn.querySelector('.material-symbols-outlined');

            toggleBtn.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                iconSpan.textContent = isPassword ? 'visibility_off' : 'visibility';
            });
        });
    </script>
