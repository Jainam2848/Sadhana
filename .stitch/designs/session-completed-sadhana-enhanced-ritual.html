<script>
        document.addEventListener('DOMContentLoaded', () => {
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            // --- Number Counter Animation ---
            function animateValue(obj, start, end, duration) {
                if (prefersReducedMotion) {
                    obj.innerHTML = end;
                    return;
                }
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    // Ease out expo
                    const easeProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                    obj.innerHTML = Math.floor(easeProgress * (end - start) + start);
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    }
                };
                window.requestAnimationFrame(step);
            }

            setTimeout(() => {
                const durationEl = document.getElementById('duration-counter');
                const streakEl = document.getElementById('streak-counter');
                if(durationEl) animateValue(durationEl, 0, 12, 1000);
                if(streakEl) animateValue(streakEl, 0, 12, 1000);
            }, 500);


            // --- Confetti Animation ---
            if (!prefersReducedMotion) {
                const canvas = document.getElementById('confetti-canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                const colors = ['#C44B22', '#F5E6C8', '#1A6B3A'];
                const particles = [];
                let animationId;

                class Particle {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = -20 - Math.random() * 100;
                        this.vx = (Math.random() - 0.5) * 2;
                        this.vy = Math.random() * 3 + 2;
                        this.size = Math.random() * 6 + 4;
                        this.color = colors[Math.floor(Math.random() * colors.length)];
                        this.rotation = Math.random() * 360;
                        this.rotationSpeed = (Math.random() - 0.5) * 5;
                        this.swaySpeed = Math.random() * 0.05 + 0.02;
                        this.swayOffset = Math.random() * Math.PI * 2;
                        this.life = 1.0;
                        this.scaleY = 1.0;
                        this.spinSpeed = Math.random() * 0.1 + 0.05;
                    }
                    update() {
                        this.x += this.vx + Math.sin(Date.now() * this.swaySpeed + this.swayOffset) * 1.5;
                        this.y += this.vy;
                        this.rotation += this.rotationSpeed;
                        this.scaleY = Math.cos(Date.now() * this.spinSpeed + this.swayOffset); // 3D spin effect
                        
                        if (this.y > canvas.height + 20) {
                            this.y = -20;
                            this.x = Math.random() * canvas.width;
                        }
                    }
                    draw() {
                        ctx.save();
                        ctx.translate(this.x, this.y);
                        ctx.rotate(this.rotation * Math.PI / 180);
                        ctx.scale(1, Math.abs(this.scaleY));
                        ctx.fillStyle = this.color;
                        
                        // Organic petal/teardrop shape
                        ctx.beginPath();
                        ctx.moveTo(0, -this.size);
                        ctx.bezierCurveTo(this.size, -this.size, this.size, this.size, 0, this.size * 1.5);
                        ctx.bezierCurveTo(-this.size, this.size, -this.size, -this.size, 0, -this.size);
                        ctx.fill();
                        
                        ctx.restore();
                    }
                }

                // Continuous falling confetti
                for (let i = 0; i < 75; i++) {
                    particles.push(new Particle());
                    particles[i].y = Math.random() * canvas.height; // initial scatter
                }
                
                function render() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    for (let i = 0; i < particles.length; i++) {
                        particles[i].update();
                        particles[i].draw();
                    }
                    animationId = requestAnimationFrame(render);
                }
                render();
                
                // Stop after 6 seconds to save battery
                setTimeout(() => {
                    cancelAnimationFrame(animationId);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }, 6000);
            }

            // --- Ad Overlay Logic ---
            const adDuration = 10; // seconds
            let timeLeft = adDuration;
            const timerText = document.getElementById('ad-timer-text');
            const timerCircle = document.getElementById('ad-timer-circle');
            const skipBtn = document.getElementById('ad-skip-btn');
            const adOverlay = document.getElementById('ad-overlay');
            
            const circumference = 2 * Math.PI * 20; // r=20
            
            const adInterval = setInterval(() => {
                timeLeft -= 0.1;
                
                // Update text every second
                timerText.textContent = Math.ceil(Math.max(0, timeLeft));
                
                // Update circle stroke
                const progress = timeLeft / adDuration;
                timerCircle.style.strokeDashoffset = circumference * (1 - progress);

                // Show skip button after 10s
                if (timeLeft <= 0) {
                    clearInterval(adInterval);
                    timerText.textContent = 0;
                    timerCircle.style.strokeDashoffset = circumference;
                    timerCircle.style.stroke = 'rgba(255,255,255,0.3)'; // Dim when done
                    skipBtn.classList.remove('opacity-0', 'pointer-events-none');
                    skipBtn.classList.add('opacity-100', 'pointer-events-auto');
                }
            }, 100);

            skipBtn.addEventListener('click', () => {
                adOverlay.classList.add('hidden-ad');
                // Clean up DOM after fade
                setTimeout(() => {
                    adOverlay.remove();
                }, 500);
            });
        });
    </script>
