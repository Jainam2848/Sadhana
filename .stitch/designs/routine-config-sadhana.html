<!DOCTYPE html><html class="light" lang="en"><head>

<style>
        body {
            background-color: #FDFAF5; /* Warm Bone */
            color: #231a0f;
            -webkit-tap-highlight-color: transparent;
        }

        /* The Mandala Thread */
        .mandala-thread {
            position: fixed;
            top: -20vw;
            right: -20vw;
            width: 50vw;
            height: 50vw;
            border-radius: 50%;
            border: 0.5px solid #C44B22; /* Terracotta */
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
            max-width: 400px;
            max-height: 400px;
        }

        /* Animation Classes */
        .stagger-enter {
            opacity: 0;
            transform: translateY(8px);
            animation: slideUpFadeIn 0.5s ease-out forwards;
        }

        @keyframes slideUpFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Toggle Switch Styling */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #1A6B3A; /* Ashoka Green */
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #1A6B3A; /* Ashoka Green */
        }
        
        .interaction-spring {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .interaction-spring:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative font-body-md text-body-md">
<!-- The Mandala Thread Anchor -->
<div class="mandala-thread hidden md:block"></div>
<div class="mandala-thread md:hidden" style="width: 70vw; height: 70vw; top: -25vw; right: -25vw;"></div>
<!-- Top Navigation (Transactional/Task focused, hides BottomNav) -->
<header class="flex justify-between items-center px-margin-page h-16 w-full bg-background-bone/80 backdrop-blur-md sticky top-0 z-50">
<button aria-label="Back" class="w-10 h-10 flex items-center justify-center text-primary-container interaction-spring">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300;">arrow_back_ios_new</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-background text-center flex-1">Morning Sanctuary</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin-page py-stack-md flex flex-col w-full max-w-2xl mx-auto z-10 relative">
<!-- Routine Segments -->
<div class="flex flex-col gap-stack-sm mb-section-gap">
<!-- Segment 1: Asana -->
<div class="bg-surface-white rounded-xl border border-border-subtle p-4 flex items-center gap-4 stagger-enter" style="animation-delay: 100ms;">
<div class="w-12 h-12 rounded-full bg-highlight-sandstone flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">accessibility_new</span>
</div>
<div class="flex-1">
<h3 class="font-label-md text-label-md text-on-surface">Asana</h3>
<p class="font-label-sm text-label-sm text-secondary">Sun Salutations</p>
</div>
<div class="font-label-sm text-label-sm text-secondary shrink-0">5 min</div>
</div>
<!-- Segment 2: Pranayama -->
<div class="bg-surface-white rounded-xl border border-border-subtle p-4 flex items-center gap-4 stagger-enter" style="animation-delay: 200ms;">
<div class="w-12 h-12 rounded-full bg-highlight-sandstone flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">air</span>
</div>
<div class="flex-1">
<h3 class="font-label-md text-label-md text-on-surface">Pranayama</h3>
<p class="font-label-sm text-label-sm text-secondary">Equal Breathing</p>
</div>
<div class="font-label-sm text-label-sm text-secondary shrink-0">4 min</div>
</div>
<!-- Segment 3: Dhyana -->
<div class="bg-surface-white rounded-xl border border-border-subtle p-4 flex items-center gap-4 stagger-enter" style="animation-delay: 300ms;">
<div class="w-12 h-12 rounded-full bg-highlight-sandstone flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">self_improvement</span>
</div>
<div class="flex-1">
<h3 class="font-label-md text-label-md text-on-surface">Dhyana</h3>
<p class="font-label-sm text-label-sm text-secondary">Silent Observation</p>
</div>
<div class="font-label-sm text-label-sm text-secondary shrink-0">3 min</div>
</div>
</div>
<!-- Configuration Options -->
<div class="mt-auto stagger-enter" style="animation-delay: 400ms;">
<hr class="border-t border-border-subtle mb-stack-md">
<div class="flex justify-between items-center mb-stack-sm">
<span class="font-label-md text-[13px] text-on-surface">Download for offline</span>
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-surface-white border-4 border-surface-container-high appearance-none cursor-pointer z-10 top-0 transition-all duration-300" id="offline-toggle" name="toggle" type="checkbox">
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-surface-container-high cursor-pointer transition-colors duration-300" for="offline-toggle"></label>
</div>
</div>
<div class="text-center mt-stack-lg mb-stack-md">
<span class="font-label-md text-[13px] text-secondary">12 minutes · 3 segments</span>
</div>
</div>
</main>
<!-- Sticky Bottom Action -->
<div class="sticky bottom-0 left-0 w-full bg-background-bone/90 backdrop-blur-md p-margin-page pb-8 z-50 flex justify-center stagger-enter" style="animation-delay: 500ms;">
<button class="w-full max-w-md bg-primary-container text-on-primary font-label-md text-label-md py-4 px-6 rounded-full interaction-spring flex items-center justify-center gap-2">
<span>Start Practice</span>
<span class="material-symbols-outlined" style="font-size: 20px;">play_arrow</span>
</button>
</div>
</body></html>
