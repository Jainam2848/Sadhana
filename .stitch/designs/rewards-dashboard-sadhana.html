<body class="bg-background-bone text-on-surface font-body-md min-h-screen relative overflow-x-hidden flex flex-col antialiased">
<!-- Mandala Thread Arc Top Right -->

<svg class="w-full h-full text-primary-container opacity-20" fill="none" viewBox="0 0 100 100">
<path d="M 100 0 A 100 100 0 0 0 0 100" fill="none" stroke="currentColor" stroke-width="0.5"></path>
<path d="M 100 20 A 80 80 0 0 0 20 100" fill="none" stroke="currentColor" stroke-width="0.5"></path>
<path d="M 100 40 A 60 60 0 0 0 40 100" fill="none" stroke="currentColor" stroke-width="0.5"></path>
</svg>
</div>
<!-- Top App Bar -->

<div class="flex justify-between items-center px-margin-page py-4 max-w-7xl mx-auto">
<button class="text-primary dark:text-primary-fixed hover:bg-surface-container-low transition-colors active:opacity-80 p-2 rounded-full flex items-center justify-center">

</button>
<h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed">Rewards</h1>

</button>
</div>
</header>
<main class="flex-grow px-margin-page py-section-gap max-w-md mx-auto w-full pb-32 z-10 relative">
<!-- Header -->
<h2 class="font-headline-lg text-headline-lg text-on-background mb-stack-lg">Rewards</h2>
<!-- Monthly Milestone Card -->
<section class="bg-surface-white rounded-xl border border-border-subtle p-[20px] mb-stack-md flex flex-col gap-stack-sm">
<h3 class="font-label-sm text-label-sm text-secondary uppercase tracking-[0.08em]">THIS MONTH</h3>
<p class="font-body-md text-body-md font-medium text-on-background">7 of 10 sessions watched</p>
<div class="relative w-full h-2 bg-border-subtle rounded-full mt-2 mb-4 overflow-visible">
<div class="absolute top-0 left-0 h-full bg-primary-container rounded-full progress-bar-fill" data-target-width="70%" id="milestone-progress" style="width: 0%;"></div>
<!-- Tick marks -->
<div class="absolute top-1/2 left-[10%] -translate-y-1/2 w-2 h-3 rounded-[1px] bg-success-ashoka z-10 shadow-sm flex items-center justify-center border border-surface-white"></div>
<div class="absolute top-1/2 left-[30%] -translate-y-1/2 w-2 h-3 rounded-[1px] bg-success-ashoka z-10 shadow-sm flex items-center justify-center border border-surface-white"></div>
<div class="absolute top-1/2 left-[50%] -translate-y-1/2 w-2 h-3 rounded-[1px] bg-success-ashoka z-10 shadow-sm flex items-center justify-center border border-surface-white"></div>
</div>
<div class="flex flex-wrap gap-2 mt-1">
<span class="inline-flex items-center px-2 py-1 rounded-full border border-success-ashoka text-success-ashoka font-label-sm text-label-sm">
<span aria-hidden="true" class="material-symbols-outlined text-[14px] mr-1">check</span>
                    Unlock session
                </span>
<span class="inline-flex items-center px-2 py-1 rounded-full border border-success-ashoka text-success-ashoka font-label-sm text-label-sm">
<span aria-hidden="true" class="material-symbols-outlined text-[14px] mr-1">check</span>
                    Guided course
                </span>
<span class="inline-flex items-center px-2 py-1 rounded-full border border-success-ashoka text-success-ashoka font-label-sm text-label-sm">
<span aria-hidden="true" class="material-symbols-outlined text-[14px] mr-1">check</span>
                    24hr ad-free
                </span>
</div>
</section>
<!-- Karma Coins Wallet Card -->
<section class="bg-surface-white rounded-xl border border-primary-container/30 p-[20px] mb-stack-lg flex items-center justify-between">
<div class="flex flex-col">
<h3 class="font-label-sm text-label-sm text-secondary uppercase tracking-widest">KARMA COINS</h3>
<div class="text-[28px] leading-[36px] font-medium text-on-background mt-1" data-target="120" id="coin-balance">0</div>
</div>
<div class="w-8 h-8 rounded-full border border-primary-container flex items-center justify-center text-primary-container">

            </button>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Animate progress bar
            setTimeout(() => {
                const progressBar = document.getElementById('milestone-progress');
                if (progressBar) {
                    progressBar.style.width = progressBar.getAttribute('data-target-width');
                }
            }, 100);

            // Animate coin counter
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const counterElement = document.getElementById('coin-balance');
            
            if (counterElement) {
                const target = parseInt(counterElement.getAttribute('data-target'), 10) || 0;
                
                if (prefersReducedMotion) {
                    counterElement.textContent = target;
                } else {
                    const duration = 600; // ms
                    const startTime = performance.now();
                    
                    function updateCounter(currentTime) {
                        const elapsed = currentTime - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        
                        // ease-out cubic
                        const easeOut = 1 - Math.pow(1 - progress, 3);
                        const currentVal = Math.floor(target * easeOut);
                        
                        counterElement.textContent = currentVal;
                        
                        if (progress < 1) {
                            requestAnimationFrame(updateCounter);
                        } else {
                            counterElement.textContent = target;
                        }
                    }
                    
                    requestAnimationFrame(updateCounter);
                }
            }
        });
    </script>
